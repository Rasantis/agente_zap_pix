# Blueprint do Render — cria o web service a partir deste repo.
# Render → New → Blueprint → conecte Rasantis/agente_zap_pix.
# As variáveis com sync:false são pedidas na configuração (não ficam no repo).
services:
  - type: web
    name: agente-zap-pix
    runtime: docker
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    envVars:
      - key: META_GRAPH_VERSION
        value: v23.0
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: META_PHONE_NUMBER_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_VERIFY_TOKEN
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: CALENDLY_URL
        sync: false
